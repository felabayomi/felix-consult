name: CI

on:
push:
branches: [ main ]
pull_request:
branches: [ main ]

jobs:
build:
runs-on: ubuntu-latest

steps:

name: Checkout code
uses: actions/checkout@v4

name: Set up Node.js
uses: actions/setup-node@v4
with:
node-version: '18' # adjust if you use a different version

name: Install Netlify Next.js plugin (dev dependency)
run: npm install -D @netlify/plugin-nextjs

name: Run build (optional)
run: npm run build || true
